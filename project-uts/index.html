<!DOCTYPE html>

<html>
<head>
    <title>CV Mahasiswa</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <div class="header">
        <h2>Curriculum Vitae</h2>
    </div>

    <div class="content">
        <div class="form-box">
            <h3>Input Data</h3>
            <form id="cvForm">
                <label>Nama</label><br>
                <input type="text" id="nama"><br><br>

                <label>NIM</label><br>
                <input type="text" id="nim"><br><br>

                <button type="submit">Tambah</button>
            </form>
        </div>

        <div class="table-box">
            <h3>Data Mahasiswa</h3>
            <table border="1">
                <thead>
                    <tr>
                        <th>Nama</th>
                        <th>NIM</th>
                    </tr>
                </thead>
                <tbody id="dataTable">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
